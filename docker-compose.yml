version: "3.9"

services:
  vector-builder:
    build: .
    container_name: vector_builder
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./config.yml:/app/config.yml
      - ${DBT_PROJECT_PATH}:/dbt
    profiles:
      - setup
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGINGFACEHUB_API_TOKEN=${HF_TOKEN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - ATHENA_OUTPUT_S3=${ATHENA_OUTPUT_S3}
      - ATHENA_DATABASE=${ATHENA_DATABASE}
      - MANIFEST_PATH=${MANIFEST_PATH}
    command: python generate_database_knowledge.py

  retriever:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./config.yml:/app/config.yml
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGINGFACEHUB_API_TOKEN=${HF_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    command: uvicorn retriever_api:app --host 0.0.0.0 --port 8000 --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  query-service:
    build: .
    ports:
      - "8003:8003"
    depends_on:
      retriever:
        condition: service_healthy
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - ATHENA_OUTPUT_S3=${ATHENA_OUTPUT_S3}
      - ATHENA_DATABASE=${ATHENA_DATABASE}
      - SESSION_STORE=${SESSION_STORE}
      - RETRIEVER_URL=http://retriever:8000/retrieve
    volumes:
      - ./config.yml:/app/config.yml
    command: uvicorn query_api:app --host 0.0.0.0 --port 8003

  streamlit-app:
    build: .
    container_name: streamlit_ui
    ports:
      - "8501:8501"
    depends_on:
      query-service:
        condition: service_started
    environment:
      - QUERY_SERVICE_URL=http://query-service:8003
    command: streamlit run frontend.py --server.port=8501 --server.address=0.0.0.0
